# mise configuration for wayclick
# https://mise.jdx.dev
# Rust is expected to be installed via rustup or system package manager.

[tasks.build]
description = "Build all workspace crates"
run = "cargo build --workspace"

[tasks.release]
description = "Build release binaries"
run = "cargo build --workspace --release"

[tasks.test]
description = "Run all tests"
run = "cargo test --workspace"

[tasks.check]
description = "Run all CI checks (fmt, clippy, test, deny)"
run = """
set -e
echo "=== fmt ===" && cargo fmt --all -- --check
echo "=== clippy ===" && cargo clippy --workspace -- -D warnings
echo "=== test ===" && cargo test --workspace
echo "=== deny ===" && cargo deny check
"""

[tasks.fmt]
description = "Format all code"
run = "cargo fmt --all"

[tasks.fuzz]
description = "Run fuzz tests (requires nightly)"
run = """
cd fuzz
rustup run nightly cargo fuzz run fuzz_config_loader -- -max_total_time=60
rustup run nightly cargo fuzz run fuzz_ipc_frame -- -max_total_time=60
rustup run nightly cargo fuzz run fuzz_device_match -- -max_total_time=60
"""

[tasks.bench]
description = "Run Criterion benchmarks"
run = "cargo bench --features bench-internals"

[tasks.bench-quick]
description = "Quick benchmark smoke test (reduced samples)"
run = "cargo bench --features bench-internals -- --sample-size 10 --warm-up-time 1 --measurement-time 3"

[tasks.dev]
description = "Quick development setup"
run = "./scripts/dev.sh"

[tasks.playground]
description = "Run the wayclick-playground input visualiser"
run = "cargo run -p wayclick-playground --release"

[tasks.playground-dev]
description = "Run the wayclick-playground (debug build, faster compile)"
run = "cargo run -p wayclick-playground"
