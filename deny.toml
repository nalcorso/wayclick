# Cargo deny configuration for wayclick
# https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # paste is unmaintained but only used transitively by ratatui;
    # will be resolved when ratatui updates its dependency tree.
    "RUSTSEC-2024-0436",
    # macroquad soundness issues; used only in the standalone input-viz
    # testing tool, not in the daemon. No fix available upstream.
    "RUSTSEC-2025-0035",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSL-1.0",
    "Unicode-3.0",
    "Zlib",
    "0BSD",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
